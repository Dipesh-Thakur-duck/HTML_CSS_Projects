<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="header.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <header>
      <nav class="nav-flex">
        <div class="nav-left">
          <img src="./youtube-icon/hamburger-menu.svg" alt="hamburger-menu icon" class="hamburger-menu">
          <img src="./youtube-icon/youtube-logo.svg" alt="youtube-logo" class="youtube-logo">
        </div>
        <div class="nav-middle">
          <input placeholder="Search" class="search-input">
          <button class="search-button">
            <img src="./youtube-icon/search.svg" class="search-icon">
          </button>
          <button class="voice-button">
            <img src="./youtube-icon/voice-search-icon.svg" class="voice-icon">
          </button>
        </div>
        <div class="nav-right">
          <div class="container">
            <img src="./youtube-icon/upload.svg" alt="youtube-upload">
            <img src="./youtube-icon/youtube-apps.svg" alt="youtube-apps">
            <img src="./youtube-icon/notifications.svg" alt="youtube-notification">
            <img src="../channel-pictures/channel-pic1.jpg" alt="youtube-account">
          </div>
        </div>
        
      </nav>
    </header>
    
  </body>
</html>
